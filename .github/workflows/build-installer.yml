name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
    
    - name: Install WiX Toolset
      run: |
        choco install wixtoolset -y
        echo "WIX=$env:ProgramFiles(x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_ENV
    
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          daw-engine/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Rust Engine
      working-directory: ./daw-engine
      run: cargo build --release
    
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.28.x'
    
    - name: Configure C++ UI
      working-directory: ./ui
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
    
    - name: Build C++ UI
      working-directory: ./ui
      run: cmake --build build --config Release
    
    - name: Build Installer
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        if (-not $version) { $version = "1.0.0" }
        
        cd installer/windows
        ./build-installer.ps1 -Version $version -SkipRustBuild -SkipCppBuild
    
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenDAW-Installer
        path: installer/windows/output/OpenDAW-*.msi
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: installer/windows/output/OpenDAW-*.msi
        draft: true
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
