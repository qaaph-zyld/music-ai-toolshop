name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[audio,lyrics,remix]"
          pip install pytest

      - name: Run unit tests (no slow/integration tests)
        run: pytest tests -m "not slow" -q

      - name: Smoke-test CLI
        run: toolshop doctor
