<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music AI Toolshop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <header>
                <h1>Music AI Toolshop</h1>
                <p id="repo-info">Loading repos...</p>
            </header>
            <nav id="tool-list"></nav>
            <footer>
                <button id="open-browser-btn">Open Browser</button>
                <p class="port">http://127.0.0.1:5055</p>
            </footer>
        </aside>

        <main class="workspace">
            <section id="tool-panel" class="hidden">
                <h2 id="tool-title"></h2>
                <p id="tool-desc"></p>
                <div id="tool-form"></div>
            </section>

            <section id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>Drag & drop an audio file here</p>
                    <p class="hint">or click to browse</p>
                </div>
                <input type="file" id="file-input" hidden>
            </section>

            <section id="file-info" class="file-info hidden">
                <span id="file-name"></span>
                <span id="file-status"></span>
            </section>

            <section id="progress" class="progress hidden">
                <div class="spinner"></div>
                <span id="status-text">Running...</span>
            </section>

            <section id="log" class="log hidden">
                <pre id="log-content"></pre>
            </section>

            <section id="downloads" class="downloads hidden">
                <h3>Downloads</h3>
                <ul id="download-list"></ul>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
